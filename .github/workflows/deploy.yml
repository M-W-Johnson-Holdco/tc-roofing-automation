name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject credentials into template
        env:
          RC_CLIENT_ID:             ${{ secrets.RC_CLIENT_ID }}
          RC_CLIENT_SECRET:         ${{ secrets.RC_CLIENT_SECRET }}
          RC_JWT:                   ${{ secrets.RC_JWT }}
          RC_FROM:                  ${{ secrets.RC_FROM }}
          GS_CLIENT_ID:             ${{ secrets.GS_CLIENT_ID }}
          GS_CLIENT_SECRET:         ${{ secrets.GS_CLIENT_SECRET }}
          GS_REFRESH_TOKEN:         ${{ secrets.GS_REFRESH_TOKEN }}
          GS_SHEET_ID:              ${{ secrets.GS_SHEET_ID }}
          GS_SHEET_NAME:            ${{ secrets.GS_SHEET_NAME }}
          AL_API_KEY:               ${{ secrets.AL_API_KEY }}
          GCAL_CLIENT_ID:           ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET:       ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_REFRESH_TOKEN:       ${{ secrets.GCAL_REFRESH_TOKEN }}
          GCAL_CALENDAR_DEFAULT:    ${{ secrets.GCAL_CALENDAR_DEFAULT }}
          GCAL_ID_RE_INSPECTION:    ${{ secrets.GCAL_ID_RE_INSPECTION }}
          GCAL_ID_INSURANCE_ADJUSTMENT: ${{ secrets.GCAL_ID_INSURANCE_ADJUSTMENT }}
          GCAL_ID_INTERIOR_INS_ADJ: ${{ secrets.GCAL_ID_INTERIOR_INS_ADJ }}
          GCAL_ID_FORENSIC:         ${{ secrets.GCAL_ID_FORENSIC }}
          GCAL_ID_ENGINEER:         ${{ secrets.GCAL_ID_ENGINEER }}
          GCAL_ID_ON_ROOF:          ${{ secrets.GCAL_ID_ON_ROOF }}
          GCAL_ID_INTERIOR_INSP:    ${{ secrets.GCAL_ID_INTERIOR_INSP }}
          GCAL_ID_SHINGLE_PULL:     ${{ secrets.GCAL_ID_SHINGLE_PULL }}
          GCAL_ID_VIDEO_REPAIR:     ${{ secrets.GCAL_ID_VIDEO_REPAIR }}
          GCAL_ID_2ND_VIDEO_REPAIR: ${{ secrets.GCAL_ID_2ND_VIDEO_REPAIR }}
          GCAL_ID_LEAK_SOURCE:      ${{ secrets.GCAL_ID_LEAK_SOURCE }}
          GOOGLE_OAUTH_CLIENT_ID:   ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          with open('index.template.html', 'r', encoding='utf-8') as f:
              content = f.read()
          replacements = {
              '%%RC_CLIENT_ID%%':             os.environ.get('RC_CLIENT_ID',''),
              '%%RC_CLIENT_SECRET%%':         os.environ.get('RC_CLIENT_SECRET',''),
              '%%RC_JWT%%':                   os.environ.get('RC_JWT',''),
              '%%RC_FROM%%':                  os.environ.get('RC_FROM',''),
              '%%GS_CLIENT_ID%%':             os.environ.get('GS_CLIENT_ID',''),
              '%%GS_CLIENT_SECRET%%':         os.environ.get('GS_CLIENT_SECRET',''),
              '%%GS_REFRESH_TOKEN%%':         os.environ.get('GS_REFRESH_TOKEN',''),
              '%%GS_SHEET_ID%%':              os.environ.get('GS_SHEET_ID',''),
              '%%GS_SHEET_NAME%%':            os.environ.get('GS_SHEET_NAME',''),
              '%%AL_API_KEY%%':               os.environ.get('AL_API_KEY',''),
              '%%GCAL_CLIENT_ID%%':           os.environ.get('GCAL_CLIENT_ID',''),
              '%%GCAL_CLIENT_SECRET%%':       os.environ.get('GCAL_CLIENT_SECRET',''),
              '%%GCAL_REFRESH_TOKEN%%':       os.environ.get('GCAL_REFRESH_TOKEN',''),
              '%%GCAL_CALENDAR_DEFAULT%%':    os.environ.get('GCAL_CALENDAR_DEFAULT',''),
              '%%GCAL_ID_RE_INSPECTION%%':    os.environ.get('GCAL_ID_RE_INSPECTION',''),
              '%%GCAL_ID_INSURANCE_ADJUSTMENT%%': os.environ.get('GCAL_ID_INSURANCE_ADJUSTMENT',''),
              '%%GCAL_ID_INTERIOR_INS_ADJ%%': os.environ.get('GCAL_ID_INTERIOR_INS_ADJ',''),
              '%%GCAL_ID_FORENSIC%%':         os.environ.get('GCAL_ID_FORENSIC',''),
              '%%GCAL_ID_ENGINEER%%':         os.environ.get('GCAL_ID_ENGINEER',''),
              '%%GCAL_ID_ON_ROOF%%':          os.environ.get('GCAL_ID_ON_ROOF',''),
              '%%GCAL_ID_INTERIOR_INSP%%':    os.environ.get('GCAL_ID_INTERIOR_INSP',''),
              '%%GCAL_ID_SHINGLE_PULL%%':     os.environ.get('GCAL_ID_SHINGLE_PULL',''),
              '%%GCAL_ID_VIDEO_REPAIR%%':     os.environ.get('GCAL_ID_VIDEO_REPAIR',''),
              '%%GCAL_ID_2ND_VIDEO_REPAIR%%': os.environ.get('GCAL_ID_2ND_VIDEO_REPAIR',''),
              '%%GCAL_ID_LEAK_SOURCE%%':      os.environ.get('GCAL_ID_LEAK_SOURCE',''),
              '%%GOOGLE_OAUTH_CLIENT_ID%%':   os.environ.get('GOOGLE_OAUTH_CLIENT_ID',''),
          }
          for placeholder, value in replacements.items():
              content = content.replace(placeholder, value)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          size_kb = len(content.encode('utf-8')) // 1024
          print(f"Done. Output size: {size_kb}KB")
          remaining = content.count('%%')
          if remaining:
              print(f"WARNING: {remaining} %% markers still in output")
          PYEOF

      - name: Verify output size
        run: |
          SIZE=$(wc -c < index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: index.html is too small - injection likely failed"
            exit 1
          fi
          echo "OK: file size looks good"

      - name: Deploy to GitHub Pages
        run: |
          mkdir -p deploy
          cp index.html deploy/index.html
          cp "TC_White_Logo_2025__2_.png" deploy/ 2>/dev/null || true
          cd deploy
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Deploy: inject credentials and publish [skip ci]"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
