# =====================================================================
# TC Roofing Automation — GitHub Actions Deploy Workflow
#
# Runs on every push to main. Reads credentials from GitHub Secrets,
# injects them into index.template.html, and deploys the result to
# GitHub Pages as index.html. The source template never contains
# real credentials.
#
# SETUP — add these secrets in GitHub:
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#
#   RC_CLIENT_ID, RC_CLIENT_SECRET, RC_JWT, RC_FROM
#   GS_CLIENT_ID, GS_CLIENT_SECRET, GS_REFRESH_TOKEN, GS_SHEET_ID, GS_SHEET_NAME
#   AL_API_KEY
#   GCAL_CLIENT_ID, GCAL_CLIENT_SECRET, GCAL_REFRESH_TOKEN, GCAL_CALENDAR_DEFAULT
#   GCAL_ID_RE_INSPECTION, GCAL_ID_INSURANCE_ADJUSTMENT, GCAL_ID_INTERIOR_INS_ADJ
#   GCAL_ID_FORENSIC, GCAL_ID_ENGINEER, GCAL_ID_ON_ROOF, GCAL_ID_INTERIOR_INSP
#   GCAL_ID_SHINGLE_PULL, GCAL_ID_VIDEO_REPAIR, GCAL_ID_2ND_VIDEO_REPAIR, GCAL_ID_LEAK_SOURCE
# =====================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject credentials into template
        env:
          RC_CLIENT_ID:             ${{ secrets.RC_CLIENT_ID }}
          RC_CLIENT_SECRET:         ${{ secrets.RC_CLIENT_SECRET }}
          RC_JWT:                   ${{ secrets.RC_JWT }}
          RC_FROM:                  ${{ secrets.RC_FROM }}
          GS_CLIENT_ID:             ${{ secrets.GS_CLIENT_ID }}
          GS_CLIENT_SECRET:         ${{ secrets.GS_CLIENT_SECRET }}
          GS_REFRESH_TOKEN:         ${{ secrets.GS_REFRESH_TOKEN }}
          GS_SHEET_ID:              ${{ secrets.GS_SHEET_ID }}
          GS_SHEET_NAME:            ${{ secrets.GS_SHEET_NAME }}
          AL_API_KEY:               ${{ secrets.AL_API_KEY }}
          GCAL_CLIENT_ID:           ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET:       ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_REFRESH_TOKEN:       ${{ secrets.GCAL_REFRESH_TOKEN }}
          GCAL_CALENDAR_DEFAULT:    ${{ secrets.GCAL_CALENDAR_DEFAULT }}
          GCAL_ID_RE_INSPECTION:    ${{ secrets.GCAL_ID_RE_INSPECTION }}
          GCAL_ID_INSURANCE_ADJUSTMENT: ${{ secrets.GCAL_ID_INSURANCE_ADJUSTMENT }}
          GCAL_ID_INTERIOR_INS_ADJ: ${{ secrets.GCAL_ID_INTERIOR_INS_ADJ }}
          GCAL_ID_FORENSIC:         ${{ secrets.GCAL_ID_FORENSIC }}
          GCAL_ID_ENGINEER:         ${{ secrets.GCAL_ID_ENGINEER }}
          GCAL_ID_ON_ROOF:          ${{ secrets.GCAL_ID_ON_ROOF }}
          GCAL_ID_INTERIOR_INSP:    ${{ secrets.GCAL_ID_INTERIOR_INSP }}
          GCAL_ID_SHINGLE_PULL:     ${{ secrets.GCAL_ID_SHINGLE_PULL }}
          GCAL_ID_VIDEO_REPAIR:     ${{ secrets.GCAL_ID_VIDEO_REPAIR }}
          GCAL_ID_2ND_VIDEO_REPAIR: ${{ secrets.GCAL_ID_2ND_VIDEO_REPAIR }}
          GCAL_ID_LEAK_SOURCE:      ${{ secrets.GCAL_ID_LEAK_SOURCE }}
          GOOGLE_OAUTH_CLIENT_ID:    ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          cp index.template.html index.html
          sed -i "s|%%RC_CLIENT_ID%%|${RC_CLIENT_ID}|g" index.html
          sed -i "s|%%RC_CLIENT_SECRET%%|${RC_CLIENT_SECRET}|g" index.html
          sed -i "s|%%RC_JWT%%|${RC_JWT}|g" index.html
          sed -i "s|%%RC_FROM%%|${RC_FROM}|g" index.html
          sed -i "s|%%GS_CLIENT_ID%%|${GS_CLIENT_ID}|g" index.html
          sed -i "s|%%GS_CLIENT_SECRET%%|${GS_CLIENT_SECRET}|g" index.html
          sed -i "s|%%GS_REFRESH_TOKEN%%|${GS_REFRESH_TOKEN}|g" index.html
          sed -i "s|%%GS_SHEET_ID%%|${GS_SHEET_ID}|g" index.html
          sed -i "s|%%GS_SHEET_NAME%%|${GS_SHEET_NAME}|g" index.html
          sed -i "s|%%AL_API_KEY%%|${AL_API_KEY}|g" index.html
          sed -i "s|%%GCAL_CLIENT_ID%%|${GCAL_CLIENT_ID}|g" index.html
          sed -i "s|%%GCAL_CLIENT_SECRET%%|${GCAL_CLIENT_SECRET}|g" index.html
          sed -i "s|%%GCAL_REFRESH_TOKEN%%|${GCAL_REFRESH_TOKEN}|g" index.html
          sed -i "s|%%GCAL_CALENDAR_DEFAULT%%|${GCAL_CALENDAR_DEFAULT}|g" index.html
          sed -i "s|%%GCAL_ID_RE_INSPECTION%%|${GCAL_ID_RE_INSPECTION}|g" index.html
          sed -i "s|%%GCAL_ID_INSURANCE_ADJUSTMENT%%|${GCAL_ID_INSURANCE_ADJUSTMENT}|g" index.html
          sed -i "s|%%GCAL_ID_INTERIOR_INS_ADJ%%|${GCAL_ID_INTERIOR_INS_ADJ}|g" index.html
          sed -i "s|%%GCAL_ID_FORENSIC%%|${GCAL_ID_FORENSIC}|g" index.html
          sed -i "s|%%GCAL_ID_ENGINEER%%|${GCAL_ID_ENGINEER}|g" index.html
          sed -i "s|%%GCAL_ID_ON_ROOF%%|${GCAL_ID_ON_ROOF}|g" index.html
          sed -i "s|%%GCAL_ID_INTERIOR_INSP%%|${GCAL_ID_INTERIOR_INSP}|g" index.html
          sed -i "s|%%GCAL_ID_SHINGLE_PULL%%|${GCAL_ID_SHINGLE_PULL}|g" index.html
          sed -i "s|%%GCAL_ID_VIDEO_REPAIR%%|${GCAL_ID_VIDEO_REPAIR}|g" index.html
          sed -i "s|%%GCAL_ID_2ND_VIDEO_REPAIR%%|${GCAL_ID_2ND_VIDEO_REPAIR}|g" index.html
          sed -i "s|%%GCAL_ID_LEAK_SOURCE%%|${GCAL_ID_LEAK_SOURCE}|g" index.html
          sed -i "s|%%GOOGLE_OAUTH_CLIENT_ID%%|${GOOGLE_OAUTH_CLIENT_ID}|g" index.html

      - name: Verify no placeholders remain
        run: |
          if grep -q '%%' index.html; then
            echo "ERROR: Unfilled placeholders found in index.html"
            grep '%%' index.html
            exit 1
          fi
          echo "OK: All placeholders filled"

      - name: Deploy to GitHub Pages
        run: |
          # Copy generated index.html into a clean deploy folder
          mkdir -p deploy
          cp index.html deploy/index.html
          # Copy logo and other static assets
          cp "TC_White_Logo_2025__2_.png" deploy/ 2>/dev/null || true

          cd deploy
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Deploy: inject credentials and publish [skip ci]"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
